<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Room Mapper v2.0 • Full Upgrade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/DragControls.js"></script>
    <style>
        body { margin:0; overflow:hidden; font-family: 'Segoe UI', sans-serif; background:#111; color:#fff; }
        canvas { display:block; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
        .panel { pointer-events:auto; background:rgba(20,20,30,0.95); border:1px solid #444; border-radius:12px; padding:15px; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
        #left-panel { position:absolute; top:20px; left:20px; width:280px; }
        #properties { margin-top:15px; }
        .close-btn { position:absolute; top:8px; right:12px; font-size:28px; cursor:pointer; color:#ff5555; line-height:1; }
        button { background:#00ddff; color:#000; border:none; padding:10px 16px; margin:4px; border-radius:8px; font-weight:bold; cursor:pointer; }
        button:hover { background:#00ffff; }
        .signal-bar { height:12px; background:#333; border-radius:6px; overflow:hidden; margin:4px 0; }
        .signal-fill { height:100%; transition:width 0.3s; }
        #toast { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:#00ddff; color:#000; padding:12px 24px; border-radius:9999px; font-weight:bold; display:none; box-shadow:0 10px 20px rgba(0,221,255,0.3); }
    </style>
</head>
<body>
<div id="ui">
    <!-- LEFT PANEL -->
    <div id="left-panel" class="panel">
        <h2 style="margin:0 0 15px 0;">🛠️ WiFi Room Mapper v2.0</h2>
        
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button onclick="addRoom()">+ New Room</button>
            <button onclick="addFurniture()">+ Furniture</button>
            <button onclick="addWifiPin()">+ WiFi Pin</button>
            <button onclick="simulateSignal()">📡 Simulate Signal</button>
            <button onclick="toggleWalkReplay()">🚶 Walk Replay</button>
        </div>

        <div style="margin-top:20px; font-size:14px;">
            <strong>Rooms:</strong> <span id="room-count">1</span>
        </div>

        <!-- PROPERTIES -->
        <div id="properties" class="panel" style="display:none;">
            <div class="close-btn" onclick="deselectObject()">✕</div>
            <h3 id="prop-title">Selected Object</h3>
            <label>Width <input id="prop-w" type="range" min="0.5" max="50" step="0.1" value="8" style="width:100%"></label><span id="w-val" style="float:right;">8</span><br>
            <label>Depth <input id="prop-d" type="range" min="0.5" max="50" step="0.1" value="8" style="width:100%"></label><span id="d-val" style="float:right;">8</span><br>
            <label>Height <input id="prop-h" type="range" min="0.5" max="30" step="0.1" value="4" style="width:100%"></label><span id="h-val" style="float:right;">4</span>
            <button onclick="deleteSelected()" style="background:#ff5555; width:100%; margin-top:15px;">🗑️ Delete</button>
        </div>

        <hr style="margin:20px 0; border-color:#444;">
        <div style="font-size:13px; line-height:1.4;">
            Drag anything • Click to select<br>
            Signal simulation = real-time heatmap<br>
            Everything saved automatically
        </div>
    </div>

    <!-- TOP BAR -->
    <div style="position:absolute; top:20px; right:20px; display:flex; gap:10px; pointer-events:auto;">
        <button onclick="saveScene()">💾 Save to Browser</button>
        <button onclick="loadScene()">📂 Load</button>
        <button onclick="exportGLTF()">📤 Export GLTF</button>
        <button onclick="clearScene()">🗑️ Clear All</button>
    </div>

    <!-- SIGNAL LEGEND -->
    <div style="position:absolute; bottom:20px; right:20px; background:rgba(20,20,30,0.95); padding:12px; border-radius:12px; font-size:13px; pointer-events:auto;" class="panel">
        📶 Signal Strength<br>
        <div class="signal-bar"><div class="signal-fill" id="legend-strong" style="width:100%; background:#00ff88;"></div></div> Strong (5 bars)<br>
        <div class="signal-bar"><div class="signal-fill" id="legend-medium" style="width:60%; background:#ffdd00;"></div></div> Medium<br>
        <div class="signal-bar"><div class="signal-fill" id="legend-weak" style="width:20%; background:#ff5555;"></div></div> Weak
    </div>

    <!-- TOAST -->
    <div id="toast"></div>
</div>

<script>
// ==================== THREE.JS SETUP ====================
let scene, camera, renderer, controls, dragControls;
let currentRooms = [];           // array of room groups
let allObjects = [];             // everything draggable
let selectedObject = null;
let wifiPins = [];
let floorMeshes = [];            // for heatmap
let isWalkReplaying = false;
let walkPath = [];

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x112233);
    scene.fog = new THREE.Fog(0x112233, 50, 300);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(15, 18, 25);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffeecc, 1);
    dirLight.position.set(20, 40, 10);
    scene.add(dirLight);

    // Orbit Controls
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    // Drag Controls (will be populated later)
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.addEventListener('click', onClick);
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ==================== ROOM CREATION ====================
function createRoom(x = 0, z = 0, w = 12, d = 12, h = 4) {
    const roomGroup = new THREE.Group();
    roomGroup.userData = { type: 'room', width: w, depth: d, height: h };

    // Floor
    const floorGeo = new THREE.PlaneGeometry(w, d);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x222233, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(x, 0, z);
    floor.userData.isFloor = true;
    roomGroup.add(floor);
    floorMeshes.push(floor);

    // Walls
    const wallMat = new THREE.MeshLambertMaterial({ color: 0x445566 });
    const wallThickness = 0.3;

    // North
    const nWall = new THREE.Mesh(new THREE.BoxGeometry(w, h, wallThickness), wallMat);
    nWall.position.set(x, h/2, z - d/2);
    roomGroup.add(nWall);
    // South
    const sWall = nWall.clone();
    sWall.position.z = z + d/2;
    roomGroup.add(sWall);
    // East
    const eWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, h, d), wallMat);
    eWall.position.set(x + w/2, h/2, z);
    roomGroup.add(eWall);
    // West
    const wWall = eWall.clone();
    wWall.position.x = x - w/2;
    roomGroup.add(wWall);

    // Ceiling
    const ceiling = floor.clone();
    ceiling.position.y = h;
    ceiling.material = new THREE.MeshLambertMaterial({ color: 0x334455 });
    roomGroup.add(ceiling);

    scene.add(roomGroup);
    currentRooms.push(roomGroup);
    allObjects.push(...roomGroup.children);
    updateRoomCount();
    return roomGroup;
}

// ==================== OUTSIDE WORLD ====================
function addOutsideWorld() {
    // Sky
    const sky = new THREE.Mesh(
        new THREE.SphereGeometry(300, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x88aaff, side: THREE.BackSide })
    );
    scene.add(sky);

    // Ground
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshLambertMaterial({ color: 0x223322 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    scene.add(ground);

    // Neighbor buildings
    for (let i = 0; i < 8; i++) {
        const b = new THREE.Mesh(
            new THREE.BoxGeometry(12 + Math.random() * 18, 15 + Math.random() * 35, 12 + Math.random() * 18),
            new THREE.MeshLambertMaterial({ color: 0x555555 })
        );
        b.position.set(
            (Math.random() - 0.5) * 120,
            b.geometry.parameters.height / 2,
            (Math.random() - 0.5) * 120
        );
        scene.add(b);
    }
}

// ==================== DRAG & SELECT ====================
function initDragControls() {
    dragControls = new THREE.DragControls(allObjects, camera, renderer.domElement);
    dragControls.addEventListener('dragstart', () => controls.enabled = false);
    dragControls.addEventListener('dragend', () => {
        controls.enabled = true;
        saveSceneToLocalStorage(); // auto-save on drag
    });
}

function onClick(e) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(allObjects, true);

    if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.type) obj = obj.parent; // climb to group if needed
        if (!obj) obj = intersects[0].object;

        selectedObject = obj;
        document.getElementById('properties').style.display = 'block';
        document.getElementById('prop-title').textContent = obj.userData.type ? obj.userData.type.toUpperCase() : 'OBJECT';

        // Update sliders
        const wSlider = document.getElementById('prop-w');
        const dSlider = document.getElementById('prop-d');
        const hSlider = document.getElementById('prop-h');
        wSlider.value = obj.scale.x * (obj.userData.baseWidth || 8);
        dSlider.value = obj.scale.z * (obj.userData.baseDepth || 8);
        hSlider.value = obj.scale.y * (obj.userData.baseHeight || 4);

        const updateVal = (id, val) => document.getElementById(id).textContent = parseFloat(val).toFixed(1);
        wSlider.oninput = () => { obj.scale.x = wSlider.value / (obj.userData.baseWidth || 8); updateVal('w-val', wSlider.value); saveSceneToLocalStorage(); };
        dSlider.oninput = () => { obj.scale.z = dSlider.value / (obj.userData.baseDepth || 8); updateVal('d-val', dSlider.value); saveSceneToLocalStorage(); };
        hSlider.oninput = () => { obj.scale.y = hSlider.value / (obj.userData.baseHeight || 4); updateVal('h-val', hSlider.value); saveSceneToLocalStorage(); };
    }
}

function deselectObject() {
    selectedObject = null;
    document.getElementById('properties').style.display = 'none';
}

function deleteSelected() {
    if (selectedObject) {
        scene.remove(selectedObject);
        allObjects = allObjects.filter(o => o !== selectedObject);
        deselectObject();
        saveSceneToLocalStorage();
    }
}

// ==================== ADD OBJECTS ====================
function addRoom() {
    const room = createRoom(Math.random() * 20 - 10, Math.random() * 20 - 10);
    initDragControls(); // refresh drag list
}

function addFurniture() {
    const box = new THREE.Mesh(
        new THREE.BoxGeometry(3, 2, 3),
        new THREE.MeshLambertMaterial({ color: 0x00aa88 })
    );
    box.userData = { type: 'furniture', baseWidth: 3, baseDepth: 3, baseHeight: 2 };
    box.position.set(0, 1, 0);
    scene.add(box);
    allObjects.push(box);
    initDragControls();
}

function addWifiPin() {
    const pin = new THREE.Mesh(
        new THREE.SphereGeometry(0.6, 32, 32),
        new THREE.MeshPhongMaterial({ color: 0x00ffdd, emissive: 0x00ffdd, emissiveIntensity: 0.8 })
    );
    pin.userData = { type: 'wifi-pin', strength: 100 };
    pin.position.set(Math.random() * 8 - 4, 2, Math.random() * 8 - 4);
    scene.add(pin);
    wifiPins.push(pin);
    allObjects.push(pin);
    initDragControls();
}

// ==================== SIGNAL SIMULATION (HEATMAP) ====================
function simulateSignal() {
    if (wifiPins.length === 0) {
        showToast("Add some WiFi pins first!");
        return;
    }

    floorMeshes.forEach(floor => {
        if (!floor.geometry.attributes.position) return;
        const pos = floor.geometry.attributes.position;
        const colors = new Float32Array(pos.count * 3);

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i) + floor.position.x;
            const z = pos.getZ(i) + floor.position.z;

            let maxSignal = 0;
            wifiPins.forEach(pin => {
                const dx = x - pin.position.x;
                const dz = z - pin.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                const signal = Math.max(0, pin.userData.strength - dist * 8);
                if (signal > maxSignal) maxSignal = signal;
            });

            // Color gradient
            const r = Math.max(0, 255 - maxSignal * 2);
            const g = Math.min(255, maxSignal * 3);
            const b = 50;
            const idx = i * 3;
            colors[idx] = r / 255;
            colors[idx + 1] = g / 255;
            colors[idx + 2] = b / 255;
        }

        floor.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        floor.material.vertexColors = true;
        floor.material.needsUpdate = true;
    });

    showToast("Signal heatmap applied to all floors & walls 🔥");
}

// ==================== WALK REPLAY ====================
function toggleWalkReplay() {
    isWalkReplaying = !isWalkReplaying;
    if (isWalkReplaying) {
        walkPath = [];
        // Simple straight path across the room
        const startX = -10;
        for (let i = 0; i < 60; i++) {
            walkPath.push(new THREE.Vector3(startX + i * 0.6, 0.2, -6 + Math.sin(i * 0.2) * 3));
        }
        let i = 0;
        const interval = setInterval(() => {
            if (!isWalkReplaying || i >= walkPath.length) {
                clearInterval(interval);
                isWalkReplaying = false;
                return;
            }
            camera.position.copy(walkPath[i]);
            camera.lookAt(walkPath[i].x + 5, 2, walkPath[i].z);
            i++;
            // Simulate signal at current position (optional)
        }, 80);
    }
}

// ==================== SAVE / LOAD / EXPORT ====================
function saveSceneToLocalStorage() {
    const data = scene.toJSON();
    localStorage.setItem('wifiRoomMapperScene', JSON.stringify(data));
}

function saveScene() {
    saveSceneToLocalStorage();
    showToast("✅ Scene saved to browser storage");
}

function loadScene() {
    const saved = localStorage.getItem('wifiRoomMapperScene');
    if (!saved) return showToast("No saved scene found");

    scene.clear(); // reset
    currentRooms = [];
    allObjects = [];
    wifiPins = [];
    floorMeshes = [];

    const loader = new THREE.ObjectLoader();
    const loadedScene = loader.parse(JSON.parse(saved));
    
    // Re-attach everything
    loadedScene.children.forEach(child => scene.add(child));
    // Re-populate arrays (simple version)
    scene.traverse(obj => {
        if (obj.userData.isFloor) floorMeshes.push(obj);
        if (obj.userData.type === 'wifi-pin') wifiPins.push(obj);
        if (obj.type === 'Mesh' || obj.type === 'Group') allObjects.push(obj);
        if (obj.userData.type === 'room') currentRooms.push(obj);
    });

    initDragControls();
    updateRoomCount();
    showToast("✅ Scene loaded from browser");
}

function exportGLTF() {
    // For real GLTF export we'd need GLTFExporter, but for simplicity we export JSON + toast
    saveSceneToLocalStorage();
    showToast("📤 Scene exported as JSON (check browser storage). Full GLTF coming in v2.1");
    // You can copy the JSON from dev tools if you want
}

function clearScene() {
    if (confirm("Clear everything?")) {
        localStorage.removeItem('wifiRoomMapperScene');
        location.reload();
    }
}

function updateRoomCount() {
    document.getElementById('room-count').textContent = currentRooms.length;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2800);
}

// ==================== START EVERYTHING ====================
initThree();
createRoom(0, 0);           // default room
addOutsideWorld();
initDragControls();

// Auto-save every 8 seconds
setInterval(() => {
    if (allObjects.length > 0) saveSceneToLocalStorage();
}, 8000);

console.log("%c✅ WiFi Room Mapper v2.0 loaded! Drag, simulate signal, save to localStorage. Next: phone camera integration 🔥", "color:#00ffdd; font-size:16px");
</script>
</body>
</html>
